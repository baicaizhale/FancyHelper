# 配置版本，请勿修改
version: 3.8.5

# 插件设置
settings:
  # 是否启用调试模式，启用后会在控制台输出详细调试信息
  debug: false
  # 是否启用猫娘模式，启用后Fancy将扮演猫娘，注意某些模型可能会拒绝这个要求
  meow: true
  # 如果支持流式输出但玩家没有设置，是否默认启用流式输出
  streaming: true
  # 补充系统提示词（会自动追加到基础系统提示词后面，不加就留空；注意如果是角色扮演类提示词请关闭Meow模式）
  supplementary_prompt: ""
  # CLI 模式会话的自动过期时间 （以分钟为单位）
  timeout_minutes: 10
  # API 请求超时时间（以秒为单位）
  # 对于推理模型（如 gpt-oss-120b、deepseek-reasoner、kimi-k2.5 等），建议设置为 120-300 秒
  # 对于普通模型（如 gpt-4o、gpt-4o-mini），建议设置为 60-120 秒
  api_timeout_seconds: 120
  # 上下文窗口剩余警告阈值
  context_window_warning_threshold: 500
  # 上下文窗口大小上限
  context_window_limit: 200000
  # 是否启用匿名错误上报，帮助开发者改进插件
  auto_report: true  
  # 是否启用自动更新检查
  check_update: true
  # 是否在管理员进入服务器时提示更新
  op_update_notify: true
  # 是否在检测到新版本时自动下载并安装更新，Paper及下游服务端推荐开启（使用Spigot及上游服务端请关闭此选项，目前还是会出bug）
  auto_upgrade: true
  # 防循环检测的连续相似调用阈值
  anti_loop:
    # 连续多少次相似调用触发中断
    threshold_count: 4
    # 相似度阈值 (0.0 - 1.0)，建议 0.95
    similarity_threshold: 0.95
    # 单次对话中连续调用工具的最大次数 (防止 AI 陷入逻辑循环或过度消耗)
    max_chain_count: 30
  # SMART 模式风险阈值 (0-100)，当风险值高于此值时需要玩家确认
  smart_risk_threshold: 50
# 日志保留天数，超过此天数的日志将被自动删除
  log_retention_days: 15
  # YOLO 模式下需要手动确认的风险命令列表（匹配前缀）
  yolo_risk_commands:
    - op
    - deop
    - stop
    - reload
    - restart
    - kill
    - nbt
    - ban
    - unban
    - plugman
    - plm
    - whitelist
    - lp
    - luckperms
    - data
    - scoreboard
    - tag

# 提供商选择（接受参数：cloudflare/openai）
provider: cloudflare

# CloudFlare Workers AI 配置
cloudflare:
  # CloudFlare Workers AI API 密钥，FancyHelper会自动根据密钥来获取对应的account-id
  # 如果你有疑问，可以看看 https://blog.baicaizhale.top/post/create-cf-key-for-fhai
  cf_key: "maF_cBg4UXnWgTaE8t8tdAq-iGZ5osv6CHxm2nH0"
  # 代理地址（可选），如果设置则所有请求会经过此代理转发到 Cloudflare Workers AI
  # 代理必须兼容 /v1/chat/completions 和 /v1/responses 端点
  proxy_url: "https://ptc.fancy.baicaizhale.top"
  # 使用的模型名称，不推荐更改，可以是任何一个Text-Generation模型
  model: "@cf/google/gemma-4-26b-a4b-it"
  # 副模型设置（用于压缩等轻量级任务，使用主模型的 cf_key）
  co-model: "@cf/google/gemma-4-26b-a4b-it"

# OpenAI 兼容端点配置（provider 设为 openai 时使用）
# 理论上支持所有兼容 OpenAI Chat Completions API 的服务商
# 详细配置指南见：https://blog.baicaizhale.top/post/openai-compatible-providers
openai:
  # API 地址，各服务商地址不同
  api_url: https://api.deepseek.com/chat/completions
  # API 密钥
  api_key: your-openai-api-key
  # 模型名称
  model: deepseek-v4-pro
  # 副模型设置（用于压缩等轻量级任务，使用主模型的 api_url 和 api_key）
  co-model: deepseek-v4-flash

# Metaso AI 搜索配置（秘塔AI搜索API，提供更强大的AI网络搜索能力，开启时优先级最高）
metaso:
  # 是否启用 Metaso AI 搜索（默认关闭，启用后将使用 Metaso API 进行 AI 搜索）
  enabled: true
  # Metaso API 令牌，从 https://metaso.cn/search-api/api-keys 获取
  api_token: mk-A8D756FEDE5A65D47124446CDF97D728
  # 使用的模型名称（fast: 快速模型，pro: 专业模型）
  model: fast
  # 是否启用简洁摘要模式
  concise_snippet: true

# Tavily 搜索 API 配置（用于增强全网搜索能力，优先级小于Metaso）
tavily:
  # 是否启用 Tavily 搜索（启用后将使用 Tavily API 进行全网搜索）
  enabled: true
  # Tavily API 密钥，从 https://app.tavily.com/home 获取。如果你有霍格沃兹环境请使用自己的密钥
  api_key: "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"
  # Tavily API 代理地址，用于解决国内网络访问问题，留空则使用官方地址。我简直算是为了这个代理而买了一个域名QWQ(求赞助)
  proxy_url: "https://tavilyproxy.baicaizhale.top" 
  # 搜索结果数量限制（1-10）
  max_results: 7
  # 是否包含原始内容（可能增加响应时间）
  include_raw_content: false

# 公告配置
notice:
  # 玩家加入时是否显示插件公告（需要 FancyHelper.notice 权限）
  show_on_join: true
  # 每隔多久从服务器拉取公告（单位：分钟），默认 5 分钟
  refresh_interval: 5

# 声音反馈配置
sounds:
  # 全局开关，设为 false 则所有声音反馈都不播放
  enabled: true
  # AI 回复完成时的音效
  ai_complete: "block.note_block.hat"
  # AI 调用出错时的音效
  ai_error: "block.note_block.bass"
  # 进入 CLI 模式时的音效
  cli_enter: "block.note_block.chime"
  # 退出 CLI 模式时的音效
  cli_exit: "block.note_block.bell"
  # 玩家发送消息时的音效
  user_input: "block.wooden_button.click_on"

# MCP (Model Context Protocol) Client 配置
# 允许 FancyHelper 的 AI 连接到外部 MCP 服务器，调用外部工具扩展能力
# 教程详见 https://blog.baicaizhale.top/post/mcp-config
mcp:
  client:
    # 是否启用 MCP Client
    enabled: false
    # 工具调用超时时间（秒）
    call_timeout: 30
    # 连接超时时间（秒）
    connect_timeout: 10
    # 断开后自动重连间隔（分钟），0 表示不自动重连
    reconnect_interval: 5
    # 外部 MCP 服务器列表
    servers: []
