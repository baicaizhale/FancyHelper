# 配置版本，请勿修改
version: 3.7.1

# 插件设置
settings:
  # 是否启用调试模式，启用后会在控制台输出详细调试信息
  debug: false
  # 是否启用猫娘模式，启用后Fancy将扮演猫娘，注意某些模型(特别是国产模型如DeepSeek)可能会拒绝这个要求
  meow: true
  # 补充系统提示词（会自动追加到基础系统提示词后面，不加就留空；注意如果是角色扮演类提示词请关闭Meow模式）
  supplementary_prompt: ""
  # CLI 模式会话的自动过期时间 （以分钟为单位）
  timeout_minutes: 10
  # API 请求超时时间（以秒为单位）
  # 对于推理模型（如 gpt-oss-120b、deepseek-reasoner、kimi-k2.5 等），建议设置为 120-300 秒
  # 对于普通模型（如 gpt-4o、gpt-4o-mini），建议设置为 60-120 秒
  api_timeout_seconds: 120
  # Token（字符数）剩余警告阈值
  token_warning_threshold: 100
  # 是否启用匿名错误上报，帮助开发者改进插件
  auto_report: true  
  # 是否启用自动更新检查
  check_update: true  
  # 是否在管理员进入服务器时提示更新
  op_update_notify: true 
  # 是否在检测到新版本时自动下载并安装更新，Paper及下游服务端推荐开启（使用Spigot及上游服务端请关闭此选项，目前还是会出bug）
  auto_upgrade: true  
  # GitHub 镜像源，用于加速下载
  update_mirror: "https://ghproxy.net/"  
  # 防循环检测的连续相似调用阈值
  anti_loop:
    # 连续多少次相似调用触发中断
    threshold_count: 4
    # 相似度阈值 (0.0 - 1.0)，建议 0.95
    similarity_threshold: 0.95
    # 单次对话中连续调用工具的最大次数 (防止 AI 陷入逻辑循环或过度消耗)
    max_chain_count: 30
  # SMART 模式风险阈值 (0-100)，当风险值高于此值时需要玩家确认
  smart_risk_threshold: 50
# 日志保留天数，超过此天数的日志将被自动删除
  log_retention_days: 15
  # YOLO 模式下需要手动确认的风险命令列表（匹配前缀）
  yolo_risk_commands:
    - op
    - deop
    - stop
    - reload
    - restart
    - kill
    - nbt
    - ban
    - unban
    - plugman
    - plm
    - whitelist
    - lp
    - luckperms
    - data
    - scoreboard
    - tag

# 公告配置
notice:
  # 玩家加入时是否显示插件公告（需要 FancyHelper.notice 权限）
  show_on_join: true
  # 每隔多久从服务器拉取公告（单位：分钟），默认 5 分钟
  refresh_interval: 5

# 上下文压缩模型配置（用于压缩长上下文，与主模型隔离以节省成本）
co-model:
  # 压缩模型提供商: cloudflare 或 openai
  provider: cloudflare
  # CloudFlare 压缩模型配置
  cloudflare:
    # 使用的模型名称，推荐使用轻量级模型以节省成本和提升速度
    model: "@cf/google/gemma-4b-it"
  # OpenAI 兼容 API 压缩模型配置
  openai:
    # API 地址
    api_url: https://api.openai.com/v1/chat/completions
    # API 密钥
    api_key: your-openai-api-key
    # 使用的模型名称，推荐使用轻量级模型
    model: gpt-4o-mini

# CloudFlare Workers AI 配置
cloudflare:
  # CloudFlare Workers AI API 密钥，FancyHelper会自动根据密钥来获取对应的account-id
  cf_key: "maF_cBg4UXnWgTaE8t8tdAq-iGZ5osv6CHxm2nH0"
  # 使用的模型名称，不推荐更改，可以是任何一个Text-Generation模型
  model: "@cf/moonshotai/kimi-k2.5"

# OpenAI 兼容 API 配置（支持自定义 OpenAI 接口）
openai:
  # 是否启用 OpenAI 兼容模式（启用后将优先使用此配置）
  enabled: false
  # Based API 地址（支持自定义地址，如 OpenAI 官方、Azure OpenAI、本地模型等）
  # 示例：
  #   - OpenAI 官方: https://api.openai.com/v1/chat/completions
  #   - DeepSeek: https://api.deepseek.com/chat/completions
  #   - Ollama (本地): http://localhost:11434/v1/chat/completions
  #   - 阿里云通义千问: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  #   - Kimi开放平台: https://api.moonshot.cn/v1/chat/completions
  #   - 其他兼容 OpenAI 格式的 API
  api_url: https://api.openai.com/v1/chat/completions
  # API 密钥
  api_key: your-openai-api-key
  # 使用的模型名称
  # 示例：
  #   - OpenAI: gpt-4o, gpt-4o-mini, o1-preview, o1-mini
  #   - DeepSeek: deepseek-chat, deepseek-reasoner
  #   - Ollama: llama3, mistral
  #   - Kimi开放平台: kimi-k2.5
  #   - 阿里云通义千问: qwen3-max
  model: gpt-4o

# Metaso AI 搜索配置（秘塔AI搜索API，提供更强大的AI网络搜索能力，开启时优先级最高）
metaso:
  # 是否启用 Metaso AI 搜索（默认关闭，启用后将使用 Metaso API 进行 AI 搜索）
  enabled: true
  # Metaso API 令牌，从 https://metaso.cn/search-api/api-keys 获取
  api_token: mk-A8D756FEDE5A65D47124446CDF97D728
  # 使用的模型名称（fast: 快速模型，pro: 专业模型）
  model: fast
  # 是否启用简洁摘要模式
  concise_snippet: true

# Tavily 搜索 API 配置（用于增强全网搜索能力，优先级小于Metaso）
tavily:
  # 是否启用 Tavily 搜索（启用后将使用 Tavily API 进行全网搜索）
  enabled: true
  # Tavily API 密钥，从 https://app.tavily.com/home 获取。如果你有霍格沃兹环境请使用自己的密钥
  api_key: "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"
  # Tavily API 代理地址，用于解决国内网络访问问题，留空则使用官方地址。我简直算是为了这个代理而买了一个域名QWQ(求赞助)
  proxy_url: "https://tavilyproxy.baicaizhale.top" 
  # 搜索结果数量限制（1-10）
  max_results: 7
  # 是否包含原始内容（可能增加响应时间）
  include_raw_content: false

