name: CI-Build & Release

#！！！不要把FancyHelper改成fancyhelper

on:
  push:
    tags: [ 'v*' ]
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型（snapshot-快照包/release-正式包）'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - release
      custom_version:
        description: '自定义版本号（仅release类型生效，无需带v前缀）'
        required: false
        type: string
      skip_checks:
        description: '跳过检查（仅用于紧急发布）'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

env:
  MAVEN_OPTS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository

jobs:
  # ==================== 单元测试 ====================
  test:
    name: 单元测试 (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_checks) }}
    strategy:
      matrix:
        java: [ 17, 21 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          # setup-java 内置缓存也需要知道自定义路径
          cache: maven

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2/repository
          key: ${{ runner.os }}-maven-java${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-java${{ matrix.java }}-
            ${{ runner.os }}-maven-

      - name: 运行单元测试
        run: mvn -B test

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-java${{ matrix.java }}
          path: target/surefire-reports/

      - name: 上传覆盖率报告
        if: matrix.java == 17
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

  # ==================== 构建和发布 ====================
  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [ test ]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    outputs:
      IS_RELEASE: ${{ steps.check_release.outputs.IS_RELEASE }}
      RELEASE_VERSION: ${{ steps.check_release.outputs.RELEASE_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 确定发布类型
      - name: Determine Release Type
        id: check_release
        run: |
          git fetch origin master --tags
          IS_RELEASE=false
          RELEASE_VERSION=""
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_type }}" == "release" ]]; then
            IS_RELEASE=true
            RELEASE_VERSION="${{ inputs.custom_version || $SHORT_SHA }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if git branch -r --contains ${{ github.sha }} | grep -q 'origin/master'; then
              IS_RELEASE=true
              RELEASE_VERSION=${GITHUB_REF_NAME#v}
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAG=$(git tag --points-at HEAD | grep '^v' | head -n 1)
            if [[ -n "$TAG" ]]; then
              IS_RELEASE=true
              RELEASE_VERSION=${TAG#v}
            fi
          fi

          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 生成短 SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 设置快照版本 (手动)
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'snapshot'
        run: mvn -B versions:set -DnewVersion=#${{ steps.sha.outputs.SHORT_SHA }} -DgenerateBackupPoms=false

      - name: 设置快照版本 (Push)
        if: (github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'workflow_dispatch'
        run: mvn -B versions:set -DnewVersion=#${{ steps.sha.outputs.SHORT_SHA }} -DgenerateBackupPoms=false

      - name: 设置发布版本 (手动)
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        run: mvn -B versions:set -DnewVersion="${{ inputs.custom_version || steps.sha.outputs.SHORT_SHA }}" -DgenerateBackupPoms=false

      - name: 设置发布版本 (Push Tag)
        if: steps.check_release.outputs.IS_RELEASE == 'true' && github.event_name != 'workflow_dispatch'
        run: mvn -B versions:set -DnewVersion="${{ steps.check_release.outputs.RELEASE_VERSION }}" -DgenerateBackupPoms=false

      - name: 编译与打包
        run: |
          if [[ "${{ steps.check_release.outputs.IS_RELEASE }}" == "true" ]]; then
            mvn -B package -DskipTests
          else
            mvn -B package
          fi

      - name: 上传构件 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: FancyHelper-${{ github.run_id }}
          path: target/FancyHelper-*.jar

  # ==================== AI 生成发行注记 Overview ====================
  generate-overview:
    name: AI 生成发行注记
    runs-on: ubuntu-latest
    needs: [ build ]
    if: needs.build.outputs.IS_RELEASE == 'true'
    outputs:
      release_body_path: ${{ steps.compose_body.outputs.BODY_PATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取变更信息并生成 Release Note
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.RELEASE_VERSION }}
        run: |
          # 1. 获取 Tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # 2. 获取提交与PR
          if [[ -n "$LAST_TAG" ]]; then
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log -20 --pretty=format:"- %s" --no-merges)
          fi
          
          # 3. AI 调用与 Body 组合逻辑 (由于长度限制，此处省略详细 AI 脚本，保持你原有的逻辑即可)
          # 注意：这里请保持你原文件中 generate-overview 步骤的具体脚本内容。
          # 核心是路径修正，AI 部分逻辑与缓存错误无关。
          echo "AI 正在生成..." > /tmp/release_body.md

      - name: 上传 Release Body
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: /tmp/release_body.md

  # ==================== 发布正式 Release ====================
  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [ build, generate-overview ]
    if: needs.build.outputs.IS_RELEASE == 'true'
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: FancyHelper-*
          path: target/
          merge-multiple: true

      - name: 下载 Release Body
        uses: actions/download-artifact@v4
        with:
          name: release-body
          path: ./

      - name: 发布正式 Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: target/FancyHelper-*.jar
          tag_name: v${{ needs.build.outputs.RELEASE_VERSION }}
          name: Release v${{ needs.build.outputs.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          body_path: ./release_body.md
          make_latest: true
